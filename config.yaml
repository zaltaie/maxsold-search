# =============================================================================
# Camera Finder — Configuration
# =============================================================================
# This app works out of the box with zero configuration.
# Just run: python main.py --scan
#
# Email notifications are optional — configure below if you want them.
# =============================================================================

# Maxsold settings
maxsold:
  region_url: "https://maxsold.com/canada/british-columbia/vancouver"
  scan_time: "08:00"         # Daily auto-scan time (24h format). Set to "" to disable.

# Camera keywords to match (title + description search)
keywords:
  digital:
    - digital camera
    - digicam
    - point and shoot
    - compact camera
    - Sony Cybershot
    - Canon PowerShot
    - Nikon Coolpix
    - Olympus Stylus
    - Panasonic Lumix
    - Fujifilm FinePix
    - Casio Exilim
    - DSLR
    - mirrorless
    - Canon EOS
    - Nikon D
    - Sony Alpha
    - Fujifilm X
    - micro four thirds
    - M43
  slr_film:
    - SLR
    - film camera
    - 35mm
    - 35 mm
    - analog camera
    - Canon AE-1
    - Canon F-1
    - Canon A-1
    - Nikon FM
    - Nikon FE
    - Nikon FA
    - Nikon F2
    - Nikon F3
    - Pentax K1000
    - Pentax Spotmatic
    - Minolta X-700
    - Minolta SR-T
    - Olympus OM-1
    - Olympus OM-10
    - Leica
    - rangefinder
    - Yashica
    - Contax
    - Konica
    - Mamiya
    - medium format
    - Hasselblad
    - Rolleiflex
    - TLR
  cine_8mm:
    - 8mm camera
    - Super 8
    - Super8
    - cine camera
    - Bolex
    - Kodak Brownie
    - Bell and Howell
    - movie camera
    - reel camera
    - 16mm
    - wind-up camera
  accessories:
    - camera lens
    - vintage lens
    - camera lot
    - camera collection
    - darkroom
    - film developing
  estate_fuzzy:
    - vintage electronics
    - lot of cameras
    - photography equipment
    - photography lot
    - camera equipment

# Watchlist — models you specifically want alerts for
watchlist:
  - Canon AE-1
  - Bolex
  - Leica
  - Hasselblad
  - Rolleiflex

# Business settings
business:
  margin_target: 0.50        # Buy at 50% of estimated resale value
  currency: CAD

# =============================================================================
# OPTIONAL: Slack / Discord webhook notifications
# Paste your webhook URL below to get instant alerts in your channel.
# =============================================================================
webhooks:
  slack_url: ""                # https://hooks.slack.com/services/...
  discord_url: ""              # https://discord.com/api/webhooks/...

# =============================================================================
# OPTIONAL: Email notifications (Gmail SMTP)
# Leave as-is to skip email. HTML reports are always generated locally.
# =============================================================================
email:
  smtp_host: "smtp.gmail.com"
  smtp_port: 587
  sender_address: ""         # Your Gmail address
  app_password: ""           # Google Account > Security > App Passwords
  recipient_address: ""      # Where to send alerts (defaults to sender)
